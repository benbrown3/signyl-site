<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signyl Instagram Logo Export</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        .export-container {
            width: 1080px;
            height: 1080px;
            background: #FAF9F7;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 24px;
        }
        .logo svg {
            width: 120px;
            height: 96px;
        }
        .logo-text {
            font-family: 'Fraunces', serif;
            font-size: 96px;
            font-weight: 500;
            color: #1a1a1a;
            letter-spacing: -0.02em;
        }
    </style>
</head>
<body>
    <div class="export-container" id="export">
        <div class="logo">
            <svg viewBox="0 0 100 80" fill="none">
                <!-- Baseline left -->
                <path d="M5 50 Q15 48 25 50 Q35 52 42 50" stroke="#8a8a8a" stroke-width="1.5" fill="none"/>
                <!-- Baseline right -->
                <path d="M58 50 Q65 52 75 50 Q85 48 95 50" stroke="#8a8a8a" stroke-width="1.5" fill="none"/>
                <!-- Orange spike (goes through baseline) -->
                <path d="M42 50 Q46 50 48 35 Q50 15 50 15 Q50 15 52 35 Q54 50 58 50" stroke="#E85A2A" stroke-width="3" fill="none" stroke-linecap="round"/>
                <!-- Glow circle -->
                <circle cx="50" cy="15" r="6" fill="#E85A2A" opacity="0.2"/>
                <!-- Solid circle -->
                <circle cx="50" cy="15" r="3" fill="#E85A2A"/>
            </svg>
            <span class="logo-text">Signyl</span>
        </div>
    </div>
</body>
</html>
